<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數學運算</title>
</head>
<body>
    <h1>數學運算器</h1>
    <form method="POST">
        <input type="number" step="any" name="x" placeholder="請輸入 x" required>
        
        <select name="opt">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        
        <input type="number" step="any" name="y" placeholder="請輸入 y" required>
        
        <button type="submit">計算</button>
    </form>

    {% if result %}
        <h2 style="color: blue;">{{ result }}</h2>
    {% endif %}

    <br>
    <a href="/">回到首頁</a>
</body>
</html>
